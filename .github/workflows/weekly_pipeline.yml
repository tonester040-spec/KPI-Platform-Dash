name: KPI Weekly Pipeline

on:
  # Every Monday at 7:00 AM Central Time = 12:00 UTC
  schedule:
    - cron: '0 12 * * 1'
  # Manual trigger for testing — supports optional DRY_RUN toggle
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip AI calls, writes, email, git push)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # Required for git push
  pages: write
  id-token: write

concurrency:
  group: kpi-pipeline
  cancel-in-progress: false   # Kill stale queued runs; flip back to false after pipeline is stable

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      # IMPORTANT: ref: refs/heads/main ensures the runner always checks out
      # the current HEAD of main at execution time, NOT the dispatch-time SHA.
      # Without this, queued runs use stale github.sha and run old code.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for rebase
          ref: refs/heads/main    # Always use latest main, not dispatch-time SHA
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install LibreOffice (required for .xls → .xlsx conversion) ──
      - name: Install LibreOffice
        run: sudo apt-get install -y libreoffice

      # ── 4. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Configure git for push ─────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "KPI Pipeline Bot"
          git config user.email "kpi-bot@users.noreply.github.com"

      # ── 5. Run Gmail Attachment Watcher (Inbox Ingestion) ────────
      # Step 0 of the weekly ingest: pulls POS export attachments from
      # karissaperformanceintelligence@gmail.com, validates sender via
      # headers, dedupes by SHA256, archives + writes to data/inbox/.
      # continue-on-error: failed ingest emails Karissa; KPI pipeline
      # still runs from whatever Sheet data is already current.
      - name: Run Gmail Attachment Watcher
        continue-on-error: true
        env:
          KPI_INBOX_CLIENT_ID:         ${{ secrets.KPI_INBOX_CLIENT_ID }}
          KPI_INBOX_CLIENT_SECRET:     ${{ secrets.KPI_INBOX_CLIENT_SECRET }}
          KPI_INBOX_REFRESH_TOKEN:     ${{ secrets.KPI_INBOX_REFRESH_TOKEN }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER:                ${{ secrets.GMAIL_SENDER }}
        run: |
          python parsers/gmail_attachment_watcher.py

      # ── 5.5 Run Tier 2 PDF Batch Processor (inbox → CURRENT tab) ──
      # Step 0.5 of the weekly ingest: consumes data/inbox/manifest.json
      # written by Step 0 (the watcher), parses each PDF with the correct
      # platform-specific parser (Zenoti v2 or Salon Ultimate v2),
      # transforms to Karissa-canonical KPIs, and writes the rows into
      # CURRENT!A2:T before main.py reads the sheet.
      #
      # Exit codes (from tier2_pdf_batch.main):
      #   0 → success / partial_success / no_files (benign)
      #   1 → hard error (bad config load, unhandled exception)
      #
      # continue-on-error: a bad batch (corrupt PDF, Sheets auth issue)
      # must NEVER block the KPI pipeline. main.py will still run and
      # regenerate dashboards from whatever CURRENT already holds — it
      # is the same fail-safe posture as the watcher in Step 0.
      #
      # Environment:
      #   GOOGLE_SERVICE_ACCOUNT_JSON — required to write CURRENT tab.
      #   ACTIVE_CUSTOMER_ID          — same value main.py uses.
      #   DRY_RUN                     — mirrors the workflow dispatch
      #                                  toggle so dry-run runs never
      #                                  touch the Sheet.
      - name: Run Tier 2 PDF Batch Processor
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ACTIVE_CUSTOMER_ID:          ${{ secrets.ACTIVE_CUSTOMER_ID || 'karissa_001' }}
          DRY_RUN:                     ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python parsers/tier2_pdf_batch.py

      # ── 6. Run pipeline ───────────────────────────────────────────
      - name: Run KPI Pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER:                ${{ secrets.GMAIL_SENDER }}
          ACTIVE_CUSTOMER_ID:          ${{ secrets.ACTIVE_CUSTOMER_ID || 'karissa_001' }}
          DRY_RUN:                     ${{ github.event.inputs.dry_run || 'false' }}
          # ── v2 Sheets shadow write (parallel build) ──────────────
          # OFF by default. Set DUAL_WRITE_V2=true in GitHub Secrets to activate.
          # If V2_MASTER_SHEET_ID is empty, the shadow write is skipped with a warning.
          # Any v2 failure is caught — legacy pipeline is never affected.
          DUAL_WRITE_V2:               ${{ secrets.DUAL_WRITE_V2 || 'false' }}
          V2_MASTER_SHEET_ID:          ${{ secrets.V2_MASTER_SHEET_ID }}
          V2_COACH_SHEET_ID:           ${{ secrets.V2_COACH_SHEET_ID }}
        run: |
          python main.py

      # ── 7. Push dashboard to GitHub ──────────────────────────────
      # Python commits docs/ locally; this step does the actual push.
      # Fetch first so the lease is current, then rebase our commit
      # on top of any remote changes (our fresh KPI data wins conflicts).
      - name: Push dashboard changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          if [ "$AHEAD" -eq 0 ]; then
            echo "Nothing new to push."
            exit 0
          fi
          echo "Pushing $AHEAD commit(s) to origin/main..."
          git fetch origin main
          if git rebase -X theirs origin/main; then
            git push origin main
          else
            echo "Rebase had conflicts — aborting and using force-with-lease"
            git rebase --abort
            git push --force-with-lease origin main
          fi
          echo "Push complete."

      # ── 8. Upload pipeline log as artifact ───────────────────────
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: data/logs/
          retention-days: 30
          if-no-files-found: warn
