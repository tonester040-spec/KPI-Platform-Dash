name: KPI Weekly Pipeline

on:
  # Every Monday at 7:00 AM Central Time = 12:00 UTC
  schedule:
    - cron: '0 12 * * 1'
  # Manual trigger for testing — supports optional DRY_RUN toggle
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip AI calls, writes, email, git push)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # Required for git push
  pages: write
  id-token: write

concurrency:
  group: kpi-pipeline
  cancel-in-progress: false   # Kill stale queued runs; flip back to false after pipeline is stable

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      # IMPORTANT: ref: refs/heads/main ensures the runner always checks out
      # the current HEAD of main at execution time, NOT the dispatch-time SHA.
      # Without this, queued runs use stale github.sha and run old code.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for rebase
          ref: refs/heads/main    # Always use latest main, not dispatch-time SHA
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install LibreOffice (required for .xls → .xlsx conversion) ──
      - name: Install LibreOffice
        run: sudo apt-get install -y libreoffice

      # ── 4. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Configure git for push ─────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "KPI Pipeline Bot"
          git config user.email "kpi-bot@users.noreply.github.com"

      # ── 5. Run pipeline ───────────────────────────────────────────
      - name: Run KPI Pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER:                ${{ secrets.GMAIL_SENDER }}
          ACTIVE_CUSTOMER_ID:          ${{ secrets.ACTIVE_CUSTOMER_ID || 'karissa_001' }}
          DRY_RUN:                     ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python main.py

      # ── 6. Push dashboard to GitHub ──────────────────────────────
      # Python commits docs/ locally; this step does the actual push.
      # Fetch first so the lease is current, then rebase our commit
      # on top of any remote changes (our fresh KPI data wins conflicts).
      - name: Push dashboard changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          if [ "$AHEAD" -eq 0 ]; then
            echo "Nothing new to push."
            exit 0
          fi
          echo "Pushing $AHEAD commit(s) to origin/main..."
          git fetch origin main
          if git rebase -X theirs origin/main; then
            git push origin main
          else
            echo "Rebase had conflicts — aborting and using force-with-lease"
            git rebase --abort
            git push --force-with-lease origin main
          fi
          echo "Push complete."

      # ── 7. Upload pipeline log as artifact ───────────────────────
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: data/logs/
          retention-days: 30
          if-no-files-found: warn
