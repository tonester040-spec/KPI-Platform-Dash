<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KPI — Karissa Performance Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#F5F7FA;color:#1A1A2E;font-size:14px;line-height:1.5}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #E8ECF0;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:22px;font-weight:800;color:#1E3A5F;letter-spacing:-.5px}
.logo span{color:#4A90D9}
.subtitle{font-size:13px;color:#7A8BA0;font-weight:500;border-left:1px solid #E8ECF0;padding-left:12px}
.header-right{font-size:13px;color:#7A8BA0;font-weight:500}
.header-right strong{color:#1E3A5F;font-weight:600}

/* ── Main ── */
.main{max-width:1280px;margin:0 auto;padding:28px 32px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#7A8BA0;margin-bottom:12px}

/* ── Summary Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.summary-card{background:#fff;border-radius:10px;padding:20px 22px;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s,border-left .2s}
.summary-card:hover{border-color:#C8D8EA;box-shadow:0 2px 8px rgba(74,144,217,.1)}
.summary-card.active{border-left:4px solid #4A90D9;background:rgba(74,144,217,.04);box-shadow:0 2px 10px rgba(74,144,217,.15)}
.card-label{font-size:12px;font-weight:600;color:#7A8BA0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.card-value{font-size:28px;font-weight:800;color:#1E3A5F;letter-spacing:-.5px;margin-bottom:8px}
.card-trend{font-size:12px;font-weight:600}
.trend-up{color:#16A34A}.trend-down{color:#DC2626}.trend-neutral{color:#7A8BA0}

/* ── Leaderboard ── */
.leaderboard-section{background:#fff;border-radius:10px;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;margin-bottom:28px}
.lb-toolbar{padding:16px 20px 12px;display:flex;justify-content:flex-end;border-bottom:1px solid #F0F3F6}
.lb-search{border:1px solid #E0E6ED;border-radius:7px;padding:7px 12px;font-size:13px;font-family:inherit;color:#2D3748;outline:none;width:220px;transition:border-color .2s}
.lb-search:focus{border-color:#4A90D9}
.lb-search::placeholder{color:#A0AEC0}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:700;color:#7A8BA0;text-transform:uppercase;letter-spacing:.06em;padding:10px 16px;text-align:left;border-bottom:1px solid #E8ECF0;background:#FAFBFC;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#4A90D9}
thead th.sort-active{color:#1E3A5F}
.sort-arrow{margin-left:4px;opacity:.5}
.sort-arrow.on{opacity:1;color:#4A90D9}
tbody tr{border-bottom:1px solid #F0F3F6;transition:background .15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#EEF4FB}
tbody td{padding:13px 16px;font-size:13.5px;color:#2D3748}
.rank-cell{font-size:15px;width:48px;text-align:center}
.loc-name{font-weight:600;color:#1E3A5F}
.delta-pos{color:#16A34A;font-weight:600}
.delta-neg{color:#DC2626;font-weight:600}
tr.row-top td:first-child{border-left:3px solid #F59E0B;padding-left:13px}
tr.row-bottom td:first-child{border-left:3px solid #EF4444;padding-left:13px}
.no-results{padding:32px;text-align:center;color:#A0AEC0;font-size:13px}

/* ── Charts ── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-card{background:#fff;border-radius:10px;border:1px solid #E8ECF0;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:22px 24px}
.chart-title{font-size:14px;font-weight:700;color:#1E3A5F;margin-bottom:18px}
.chart-container{position:relative;height:260px}

/* ── Footer ── */
.footer{background:#fff;border-top:1px solid #E8ECF0;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#A0AEC0;margin-top:8px}

/* ── Backdrop ── */
.backdrop{position:fixed;inset:0;background:rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:300}
.backdrop.open{opacity:1;pointer-events:all}

/* ── Drawer ── */
.drawer{position:fixed;top:0;right:0;width:500px;height:100vh;background:#fff;box-shadow:-6px 0 32px rgba(0,0,0,.14);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:400;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:20px 24px 16px;border-bottom:1px solid #E8ECF0;flex-shrink:0}
.drawer-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.drawer-close{background:none;border:none;cursor:pointer;font-size:18px;color:#7A8BA0;padding:2px 6px;border-radius:4px;line-height:1;transition:background .15s}
.drawer-close:hover{background:#F0F3F6}
.drawer-loc-name{font-size:20px;font-weight:800;color:#1E3A5F;letter-spacing:-.3px}
.drawer-badges{display:flex;gap:8px;align-items:center}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.03em}
.badge-platform{background:#EFF6FF;color:#1D4ED8}
.badge-rank{background:#F0FDF4;color:#15803D}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}

/* ── Back button (deep dive) ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#4A90D9;cursor:pointer;margin-bottom:16px;padding:4px 0}
.back-btn:hover{color:#1E3A5F}

/* ── Metric Tiles ── */
.metric-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.metric-tile{background:#F8FAFC;border:1px solid #E8ECF0;border-radius:8px;padding:14px 14px 10px;cursor:pointer;transition:border-color .2s,background .2s}
.metric-tile:hover{border-color:#4A90D9;background:#EEF4FB}
.tile-label{font-size:10px;font-weight:700;color:#7A8BA0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.tile-value{font-size:18px;font-weight:800;color:#1E3A5F;letter-spacing:-.3px;margin-bottom:4px}
.tile-delta{font-size:11px;font-weight:600;margin-bottom:8px}
.sparkline-wrap{height:36px;position:relative}

/* ── Drawer Trend Chart ── */
.drawer-chart-title{font-size:13px;font-weight:700;color:#1E3A5F;margin-bottom:12px}
.drawer-chart-wrap{height:200px;position:relative;margin-bottom:24px}

/* ── Coach Insight ── */
.coach-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:14px 16px;margin-bottom:8px}
.coach-box p{font-size:12.5px;color:#1D4ED8;font-style:italic;line-height:1.6}

/* ── Deep Dive ── */
.deepdive-title{font-size:15px;font-weight:700;color:#1E3A5F;margin-bottom:16px}
.stat-boxes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:#F8FAFC;border:1px solid #E8ECF0;border-radius:8px;padding:14px;text-align:center}
.stat-box-label{font-size:10px;font-weight:700;color:#7A8BA0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-box-value{font-size:18px;font-weight:800;color:#1E3A5F}
.stat-box-sub{font-size:10px;color:#7A8BA0;margin-top:3px}
.trend-up-text{color:#16A34A}.trend-down-text{color:#DC2626}.trend-stable-text{color:#7A8BA0}
.dd-chart-wrap{height:180px;position:relative;margin-bottom:20px}
.network-bar-wrap{margin-bottom:20px}
.network-bar-title{font-size:12px;font-weight:700;color:#7A8BA0;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.network-bar-chart{height:64px;position:relative}
.percentile-badge{text-align:center;padding:16px;border-radius:10px;margin-bottom:8px}
.percentile-badge.good{background:#F0FDF4;border:1px solid #86EFAC}
.percentile-badge.bad{background:#FFF1F2;border:1px solid #FECDD3}
.percentile-num{font-size:28px;font-weight:800;letter-spacing:-.5px}
.percentile-badge.good .percentile-num{color:#15803D}
.percentile-badge.bad .percentile-num{color:#BE123C}
.percentile-label{font-size:12px;font-weight:600;color:#6B7280;margin-top:2px}
</style>
</head>

  prod_pct: { key:'p',  label:'Product %',     fmt: v=>v.toFixed(1)+'%',                  fmtDelta: v=>(v>=0?'▲ +':'▼ ')+Math.abs(v).toFixed(1)+'%',                                col:'Product %' },
  guests:   { key:'g',  label:'Guest Count',   fmt: v=>Math.round(v).toLocaleString(),     fmtDelta: v=>(v>=0?'▲ +':'▼ ')+Math.round(Math.abs(v)),                                   col:'Guests' },
  avg_tick: { key:'at', label:'Avg Ticket',    fmt: v=>'$'+v.toFixed(2),                  fmtDelta: v=>(v>=0?'▲ +$':'▼ $')+Math.abs(v).toFixed(2),                                   col:'' },
  wax_pct:  { key:'w',  label:'Wax %',         fmt: v=>v.toFixed(1)+'%',                  fmtDelta: v=>(v>=0?'▲ +':'▼ ')+Math.abs(v).toFixed(1)+'%',                                col:'' },
};

function getVal(loc, mKey, wIdx) {
  const h = LOC_HIST[loc];
  if (mKey === 'at') return h.s[wIdx] / h.g[wIdx];
  return h[mKey][wIdx];
}

// Build flat location array sorted by sales desc
const LOCS = Object.keys(LOC_HIST).map(name => {
  const h = LOC_HIST[name];
  return {
    name, plat: h.plat,
    sales: h.s[W], pph: h.h[W], prod_pct: h.p[W], guests: h.g[W],
    avg_tick: h.s[W]/h.g[W], wax_pct: h.w[W],
    ps: h.s[PW], ph: h.h[PW], pp: h.p[PW], pg: h.g[PW],
    pat: h.s[PW]/h.g[PW], pw2: h.w[PW],
    delta_s: h.s[W]-h.s[PW], delta_h: h.h[W]-h.h[PW],
    delta_p: h.p[W]-h.p[PW], delta_g: h.g[W]-h.g[PW],
  };
}).sort((a,b)=>b.sales-a.sales).map((l,i)=>({...l,rank:i+1}));

// Network totals (current week)
const NET_SALES    = LOCS.reduce((a,l)=>a+l.sales,0);
const NET_PPH_AVG  = LOCS.reduce((a,l)=>a+l.pph,0)/LOCS.length;
const NET_PROD_AVG = LOCS.reduce((a,l)=>a+l.prod_pct,0)/LOCS.length;
const NET_GUESTS   = LOCS.reduce((a,l)=>a+l.guests,0);

// Prior week network totals
const PNET_SALES    = LOCS.reduce((a,l)=>a+l.ps,0);
const PNET_PPH_AVG  = LOCS.reduce((a,l)=>a+l.ph,0)/LOCS.length;
const PNET_PROD_AVG = LOCS.reduce((a,l)=>a+l.pp,0)/LOCS.length;
const PNET_GUESTS   = LOCS.reduce((a,l)=>a+l.pg,0);

const PCT = (cur,prev)=>prev?((cur-prev)/prev*100):0;

const SUMMARY_CARDS = [
  { id:'sales',    label:'Network Sales',   value:'$'+Math.round(NET_SALES).toLocaleString(),   trend:PCT(NET_SALES,PNET_SALES),    sortKey:'sales' },
  { id:'pph',      label:'Avg PPH',         value:'$'+NET_PPH_AVG.toFixed(2),                    trend:PCT(NET_PPH_AVG,PNET_PPH_AVG), sortKey:'pph' },
  { id:'prod_pct', label:'Avg Product %',   value:NET_PROD_AVG.toFixed(1)+'%',                   trend:PCT(NET_PROD_AVG,PNET_PROD_AVG),sortKey:'prod_pct' },
  { id:'guests',   label:'Total Guests',    value:NET_GUESTS.toLocaleString(),                    trend:PCT(NET_GUESTS,PNET_GUESTS),   sortKey:'guests' },
];

const TREND_LABELS  = ["2026-02-16","2026-02-23","2026-03-02","2026-03-09"];
const TREND_SALES   = [152031,148273,162329,152309];
const NET_AVG_PROD  = parseFloat(NET_PROD_AVG.toFixed(1));

const BLUE_DARK  = '#1E3A5F';
const BLUE_MID   = '#4A90D9';

Chart.defaults.font.family = "'Inter',-apple-system,sans-serif";
Chart.defaults.font.size   = 12;
Chart.defaults.color       = '#7A8BA0';

function destroyChart(key) {
  if (drawerCharts[key]) { try { drawerCharts[key].destroy(); } catch(e){} delete drawerCharts[key]; }
}
function destroyAllDrawerCharts() {
  Object.keys(drawerCharts).forEach(k => destroyChart(k));
}
function freshCanvas(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return null;
  el.innerHTML = '';
  const c = document.createElement('canvas');
  el.appendChild(c);
  return c;
}
function trendArrow(v) {
  if (v > 0.05) return { arrow:'▲', cls:'trend-up' };
  if (v < -0.05) return { arrow:'▼', cls:'trend-down' };
  return { arrow:'—', cls:'trend-neutral' };
}
function calcTrend(arr) {
  const n = arr.length;
  if (n < 4) return 'stable';
  const first3 = arr.slice(0,3).reduce((a,b)=>a+b,0)/3;
  const last3  = arr.slice(-3).reduce((a,b)=>a+b,0)/3;
  const chg = (last3-first3)/first3;
  if (chg > 0.03) return 'up';
  if (chg < -0.03) return 'down';
  return 'stable';
}

const LB_COLS = [
  { id:'rank',     label:'Rank',        get: l=>l.rank,     fmt: l=>l.rank<=3?['🥇','🥈','🥉'][l.rank-1]:l.rank, tdClass:'rank-cell' },
  { id:'name',     label:'Location',    get: l=>l.name,     fmt: l=>`<span class="loc-name">${l.name}</span>`,    tdClass:'' },
  { id:'sales',    label:'Total Sales', get: l=>l.sales,    fmt: l=>'$'+Math.round(l.sales).toLocaleString(),     tdClass:'' },
  { id:'pph',      label:'PPH',         get: l=>l.pph,      fmt: l=>'$'+l.pph.toFixed(2),                        tdClass:'' },
  { id:'prod_pct', label:'Product %',   get: l=>l.prod_pct, fmt: l=>l.prod_pct.toFixed(1)+'%',                   tdClass:'' },
  { id:'guests',   label:'Guests',      get: l=>l.guests,   fmt: l=>l.guests.toLocaleString(),                    tdClass:'' },
  { id:'delta',    label:'vs Last Week',get: l=>l.delta_s,  fmt: l=>{
      const dk = {sales:'delta_s',pph:'delta_h',prod_pct:'delta_p',guests:'delta_g'}[activeCard]||'delta_s';
      const dv = l[dk];
      const fm = activeCard==='sales'?`${dv>=0?'+':''} $${Math.round(Math.abs(dv)).toLocaleString()}`
               : activeCard==='pph'  ?`${dv>=0?'+'  :'-'} $${Math.abs(dv).toFixed(2)}`
               : activeCard==='guests'?`${dv>=0?'+'  :''} ${Math.round(Math.abs(dv))}`
               : `${dv>=0?'+'  :''} ${Math.abs(dv).toFixed(1)}%`;
      return `<span class="${dv>=0?'delta-pos':'delta-neg'}">${dv>=0?'+':''}${fm.trim()}</span>`;
    }, tdClass:'' },
];

function getSortedFiltered() {
  let rows = [...LOCS];
  // filter
  if (filterText) {
    const q = filterText.toLowerCase();
    rows = rows.filter(l => l.name.toLowerCase().includes(q));
  }
  // sort
  const col = LB_COLS.find(c=>c.id===sortCol) || LB_COLS[0];
  rows.sort((a,b) => {
    const av = col.get(a), bv = col.get(b);
    if (typeof av === 'string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return sortDir==='asc'?av-bv:bv-av;
  });
  return rows;
}

function renderLeaderboard() {
  // Head
  const head = document.getElementById('lbHead');
  head.innerHTML = '<tr>'+LB_COLS.map(c => {
    const isActive = sortCol === c.id;
    const arrow = isActive ? (sortDir==='asc'?'↑':'↓') : '↕';
    const arrowCls = isActive ? 'sort-arrow on' : 'sort-arrow';
    return `<th class="${isActive?'sort-active':''}" onclick="sortBy('${c.id}')">${c.label}<span class="${arrowCls}">${arrow}</span></th>`;
  }).join('')+'</tr>';

  // Body
  const rows = getSortedFiltered();
  const body = document.getElementById('lbBody');
  if (rows.length === 0) {
    body.innerHTML = `<tr><td colspan="${LB_COLS.length}" class="no-results">No locations match "${filterText}"</td></tr>`;
    return;
  }
  // Re-rank based on current sort
  const total = LOCS.length;
  body.innerHTML = rows.map((l, i) => {
    const isTop    = i < 3;
    const isBottom = i >= rows.length - 2 && rows.length > 4;
    const rowCls   = isTop ? 'row-top' : isBottom ? 'row-bottom' : '';
    const cells = LB_COLS.map(c => `<td class="${c.tdClass||''}">${c.fmt(l)}</td>`).join('');
    return `<tr class="${rowCls}" onclick="openDrawer('${l.name}')">${cells}</tr>`;
  }).join('');
}

function sortBy(col) {
  if (sortCol === col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol = col; sortDir = col==='name'?'asc':'desc'; }
  renderLeaderboard();
}

  sales:    { key:'s',  label:'Total Sales',  fmt:v=>'$'+Math.round(v).toLocaleString(),  hist:(n,i)=>LOC_HIST[n].s[i] },
  pph:      { key:'h',  label:'PPH',          fmt:v=>'$'+v.toFixed(2),                    hist:(n,i)=>LOC_HIST[n].h[i] },
  prod_pct: { key:'p',  label:'Product %',    fmt:v=>v.toFixed(1)+'%',                    hist:(n,i)=>LOC_HIST[n].p[i] },

  drawerView = 'overview';

function renderDeepDive() {
  destroyAllDrawerCharts();
  const mm   = METRIC_META[deepMetric];
  const loc  = LOCS.find(l=>l.name===drawerLoc);

  document.getElementById('drawerHeader').innerHTML = `
    <div class="drawer-header-top">
      <div class="back-btn" onclick="backToOverview()">← Back</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-loc-name" style="font-size:16px">${mm.label} — ${loc.name}</div>`;

  // Build full 12-week array for this metric at this location
  const fullArr = WEEKS_12.map((_,i) => mm.hist(drawerLoc, i));

  // Stats
  const best     = Math.max(...fullArr);
  const bestWk   = WEEKS_12[fullArr.indexOf(best)];
  const last12   = fullArr.slice(-12);
  const worst    = Math.min(...last12);
  const worstWk  = WEEKS_12[last12.indexOf(worst)];
  const tDir     = calcTrend(fullArr.slice(-6));
  const tLabel   = tDir==='up'?'↑ Trending Up':tDir==='down'?'↓ Trending Down':'→ Stable';
  const tCls     = tDir==='up'?'trend-up-text':tDir==='down'?'trend-down-text':'trend-stable-text';

  // Network comparison: all locations current week for this metric
  const netVals  = Object.keys(LOC_HIST).map(n => ({ name:n, val: mm.hist(n, W) }));
  netVals.sort((a,b)=>a.val-b.val);
  const netMin   = Math.min(...netVals.map(n=>n.val));
  const netMax   = Math.max(...netVals.map(n=>n.val));
  const netAvg   = netVals.reduce((a,n)=>a+n.val,0)/netVals.length;
  const curVal   = mm.hist(drawerLoc, W);
  const rank     = netVals.filter(n=>n.val<=curVal).length;
  const pctile   = Math.round((rank/netVals.length)*100);
  const isGood   = pctile >= 50;

  document.getElementById('drawerBody').innerHTML = `
    <div class="stat-boxes">
      <div class="stat-box">
        <div class="stat-box-label">Best (12 wks)</div>
        <div class="stat-box-value">${mm.fmt(best)}</div>
        <div class="stat-box-sub">${bestWk}</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">Worst (12 wks)</div>
        <div class="stat-box-value">${mm.fmt(worst)}</div>
        <div class="stat-box-sub">${worstWk}</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">Current Trend</div>
        <div class="stat-box-value ${tCls}" style="font-size:14px">${tLabel}</div>
        <div class="stat-box-sub">last 6 weeks</div>
      </div>
    </div>

    <div class="drawer-chart-title">Full 12-Week History</div>
    <div class="dd-chart-wrap" id="ddHistWrap"></div>

    <div class="network-bar-wrap">
      <div class="network-bar-title">Network Comparison — This Week</div>
      <div class="network-bar-chart" id="ddNetWrap"></div>
    </div>

    <div class="percentile-badge ${isGood?'good':'bad'}">
      <div class="percentile-num">${isGood?'Top':'Bottom'} ${isGood?(100-pctile+1):pctile}%</div>
      <div class="percentile-label">of network for ${mm.label} this week</div>
    </div>`;

  requestAnimationFrame(() => {
    // Full history line chart
    const cv1 = freshCanvas('ddHistWrap');
    if (cv1) {
      drawerCharts['ddHist'] = new Chart(cv1, {
        type:'line',
        data:{labels:WEEKS_12, datasets:[{
          label:mm.label, data:fullArr,
          borderColor:BLUE_MID, backgroundColor:BLUE_LIGHT,
          borderWidth:2.5, pointRadius:4, pointHoverRadius:6,
          fill:true, tension:0.3,
        }]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${mm.fmt(ctx.parsed.y)}`}}},
          scales:{
            x:{grid:{color:GRAY_B},ticks:{font:{size:9},maxRotation:30}},
            y:{grid:{color:GRAY_B},ticks:{font:{size:10},callback:v=>mm.fmt(v)}},
          }
        }
      });
    }

    // Network comparison horizontal bar
    const cv2 = freshCanvas('ddNetWrap');
    if (cv2) {
      const netColors = netVals.map(n=>n.name===drawerLoc?BLUE_MID:'rgba(203,213,225,0.7)');
      drawerCharts['ddNet'] = new Chart(cv2, {
        type:'bar',
        data:{
          labels:netVals.map(n=>n.name),
          datasets:[{data:netVals.map(n=>n.val),backgroundColor:netColors,borderRadius:3,borderSkipped:false}]
        },
        options:{
          indexAxis:'y',responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${mm.fmt(ctx.parsed.x)}`}}},
          scales:{
            x:{grid:{color:GRAY_B},ticks:{callback:v=>mm.fmt(v),font:{size:9}}},
            y:{display:false}
          }
        },
        plugins:[{id:'netAvgLine',afterDraw(chart){
          const {ctx:c,scales:{x,y}}=chart;
          const xp=x.getPixelForValue(netAvg);
          c.save();c.beginPath();c.moveTo(xp,y.top);c.lineTo(xp,y.bottom);
          c.strokeStyle='#DC2626';c.lineWidth=1.5;c.setLineDash([3,3]);c.stroke();
          c.fillStyle='#DC2626';c.font='600 9px Inter,sans-serif';
          c.fillText('avg',xp+3,y.top+10);c.restore();
        }}]
      });
    }
  });
}

/* ═══════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════ */
document.getElementById('lbSearch').addEventListener('input', e => {
  filterText = e.target.value.trim();
  renderLeaderboard();
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
renderCards();
renderLeaderboard();
buildMainCharts();
</script>
</body>
</html>
