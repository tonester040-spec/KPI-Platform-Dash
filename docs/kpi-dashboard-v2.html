<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#F5F7FA;color:#1A1A2E;font-size:14px;line-height:1.5}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #E8ECF0;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:22px;font-weight:800;color:#1E3A5F;letter-spacing:-.5px}
.logo span{color:#4A90D9}
.subtitle{font-size:13px;color:#7A8BA0;font-weight:500;border-left:1px solid #E8ECF0;padding-left:12px}
.header-right{font-size:13px;color:#7A8BA0;font-weight:500}
.header-right strong{color:#1E3A5F;font-weight:600}

/* ── Tab Switcher ── */
.tab-switcher{background:#fff;border-bottom:2px solid #E8ECF0;padding:0 32px;display:flex;position:sticky;top:60px;z-index:90}
.tab-btn{padding:14px 28px;font-size:14px;font-weight:600;color:#7A8BA0;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;display:flex;align-items:center;gap:7px}
